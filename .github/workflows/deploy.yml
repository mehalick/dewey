name: build-and-deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  AWS_REGION: us-east-1

jobs:
  build:
    # Native arm64 runner: AOT publish targeting linux-arm64 needs a matching
    # linker. On x64 runners the toolchain only knows x86_64 emulations, so
    # the native-code link step fails ("unrecognised emulation mode:
    # aarch64linux"). The arm64 runner has the right ld + clang.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Dewey.slnx

      - name: Build
        run: dotnet build Dewey.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Dewey.slnx --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Publish API (AOT, linux-arm64)
        run: |
          dotnet publish src/Dewey.Api/Dewey.Api.csproj \
            -c Release -r linux-arm64 --self-contained true \
            -o artifacts/api

      - name: Publish AuthTriggers (AOT, linux-arm64)
        run: |
          dotnet publish src/Dewey.AuthTriggers/Dewey.AuthTriggers.csproj \
            -c Release -r linux-arm64 --self-contained true \
            -o artifacts/auth-triggers

      - name: Publish Web
        run: |
          dotnet publish src/Dewey.Web/Dewey.Web.csproj \
            -c Release \
            -o artifacts/web-publish

      - uses: actions/upload-artifact@v7
        with:
          name: dewey-artifacts
          path: artifacts/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          name: dewey-artifacts
          path: artifacts/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK
        run: npm install -g aws-cdk@2

      - name: CDK deploy
        working-directory: src/Dewey.Infra
        env:
          DEWEY_API_PUBLISH_DIR: ${{ github.workspace }}/artifacts/api
          DEWEY_AUTH_TRIGGERS_PUBLISH_DIR: ${{ github.workspace }}/artifacts/auth-triggers
          DEWEY_WEB_PUBLISH_DIR: ${{ github.workspace }}/artifacts/web-publish/wwwroot
        run: cdk deploy --all --require-approval never
